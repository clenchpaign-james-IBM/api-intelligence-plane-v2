# API Intelligence Plane - Production Docker Compose Configuration
# Version: 1.0.0
# 
# This configuration is optimized for production deployments with:
# - Security hardening (TLS, secrets management)
# - Resource limits and health checks
# - Persistent data volumes
# - Logging and monitoring
# - High availability considerations
#
# IMPORTANT: Before deploying to production:
# 1. Update all secrets in .env.prod file
# 2. Configure proper TLS certificates
# 3. Review and adjust resource limits
# 4. Set up external monitoring and logging
# 5. Configure backup strategy for volumes

version: '3.8'

services:
  # OpenSearch - Data Store (Production Configuration)
  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: aip-opensearch-prod
    environment:
      - cluster.name=api-intelligence-cluster-prod
      - node.name=opensearch-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms4g -Xmx4g"
      - DISABLE_SECURITY_PLUGIN=false
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data-prod:/usr/share/opensearch/data
      - opensearch-logs-prod:/usr/share/opensearch/logs
      - ./certs/opensearch:/usr/share/opensearch/config/certs:ro
    ports:
      - "9200:9200"
      - "9600:9600"
    networks:
      - aip-network-prod
    healthcheck:
      test: ["CMD-SHELL", "curl -k -u admin:${OPENSEARCH_ADMIN_PASSWORD} https://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  # Backend API (Production Configuration)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - BUILD_ENV=production
    image: api-intelligence-plane/backend:${VERSION:-latest}
    container_name: aip-backend-prod
    environment:
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_SCHEME=https
      - OPENSEARCH_USER=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD}
      - OPENSEARCH_USE_SSL=true
      - OPENSEARCH_VERIFY_CERTS=false
      - LOG_LEVEL=INFO
      - ENVIRONMENT=production
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - DISCOVERY_INTERVAL=300
      - METRICS_INTERVAL=60
      - PREDICTION_INTERVAL=3600
      - SECURITY_SCAN_INTERVAL=3600
    env_file:
      - .env.prod
    volumes:
      - backend-logs-prod:/app/logs
      - backend-cache-prod:/root/.cache
    ports:
      - "8000:8000"
    networks:
      - aip-network-prod
    depends_on:
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
      replicas: 2
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4

  # Frontend - React SPA (Production Build)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://backend:8000
        - VITE_ENVIRONMENT=production
    image: api-intelligence-plane/frontend:${VERSION:-latest}
    container_name: aip-frontend-prod
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    ports:
      - "3000:80"
    networks:
      - aip-network-prod
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      replicas: 2
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # MCP Unified Server (Production Configuration)
  mcp-unified:
    build:
      context: ./mcp-servers
      dockerfile: Dockerfile
      args:
        - BUILD_ENV=production
    image: api-intelligence-plane/mcp-servers:${VERSION:-latest}
    container_name: aip-mcp-unified-prod
    environment:
      - BACKEND_URL=http://backend:8000
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_SCHEME=https
      - OPENSEARCH_USER=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD}
      - OPENSEARCH_USE_SSL=true
      - OPENSEARCH_VERIFY_CERTS=false
      - MCP_SERVER_NAME=unified
      - LOG_LEVEL=INFO
      - ENVIRONMENT=production
    env_file:
      - .env.prod
    volumes:
      - mcp-logs-prod:/app/logs
    ports:
      - "8007:8000"
    networks:
      - aip-network-prod
    depends_on:
      - backend
      - opensearch
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
      replicas: 2
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  # NGINX Reverse Proxy (Optional - for production load balancing)
  nginx:
    image: nginx:1.25-alpine
    container_name: aip-nginx-prod
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certs:/etc/nginx/certs:ro
      - nginx-logs-prod:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - aip-network-prod
    depends_on:
      - frontend
      - backend
      - mcp-unified
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Prometheus - Metrics Collection (Optional)
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: aip-prometheus-prod
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data-prod:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    networks:
      - aip-network-prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # Grafana - Metrics Visualization (Optional)
  grafana:
    image: grafana/grafana:10.2.2
    container_name: aip-grafana-prod
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana-data-prod:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    networks:
      - aip-network-prod
    depends_on:
      - prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

networks:
  aip-network-prod:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  # OpenSearch volumes
  opensearch-data-prod:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-./data}/opensearch
  opensearch-logs-prod:
    driver: local
  
  # Backend volumes
  backend-logs-prod:
    driver: local
  backend-cache-prod:
    driver: local
  
  # MCP volumes
  mcp-logs-prod:
    driver: local
  
  # NGINX volumes
  nginx-logs-prod:
    driver: local
  
  # Monitoring volumes
  prometheus-data-prod:
    driver: local
  grafana-data-prod:
    driver: local

# Production Deployment Notes:
#
# 1. Environment Variables:
#    - Copy .env.example to .env.prod
#    - Update all secrets and credentials
#    - Set VERSION for image tagging
#
# 2. TLS/SSL Certificates:
#    - Place certificates in ./certs directory
#    - Update nginx.conf with certificate paths
#    - Ensure OpenSearch certificates are configured
#
# 3. Resource Limits:
#    - Adjust CPU and memory limits based on workload
#    - Monitor resource usage and scale accordingly
#    - Consider using Docker Swarm or Kubernetes for true HA
#
# 4. Networking:
#    - Use external load balancer for production traffic
#    - Configure firewall rules appropriately
#    - Enable network encryption between services
#
# 5. Monitoring:
#    - Enable Prometheus and Grafana for metrics
#    - Configure alerting rules
#    - Set up log aggregation (ELK, Splunk, etc.)
#
# 6. Backup:
#    - Schedule regular backups of volumes
#    - Test restore procedures
#    - Document backup retention policy
#
# 7. High Availability:
#    - Use Docker Swarm mode or Kubernetes for multi-node deployment
#    - Configure service replicas appropriately
#    - Implement health checks and auto-restart policies
#
# 8. Security:
#    - Run containers as non-root users
#    - Enable security scanning for images
#    - Keep images updated with security patches
#    - Use secrets management (Docker Secrets, Vault)
#
# 9. Deployment Commands:
#    docker-compose -f docker-compose.prod.yml up -d
#    docker-compose -f docker-compose.prod.yml ps
#    docker-compose -f docker-compose.prod.yml logs -f
#    docker-compose -f docker-compose.prod.yml down
#
# 10. Scaling:
#     docker-compose -f docker-compose.prod.yml up -d --scale backend=3
#     docker-compose -f docker-compose.prod.yml up -d --scale frontend=2

