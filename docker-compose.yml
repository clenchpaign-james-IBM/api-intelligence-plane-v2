# API Intelligence Plane - Local Development Environment
version: '3.8'

services:
  # OpenSearch - Data Store
  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: aip-opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"
    networks:
      - aip-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # OpenSearch Dashboards - UI for OpenSearch
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.18.0
    container_name: aip-opensearch-dashboards
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    networks:
      - aip-network
    depends_on:
      opensearch:
        condition: service_healthy

  # Metrics Infrastructure Initialization - One-time setup
  init-metrics:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aip-init-metrics
    environment:
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_SCHEME=http
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
    networks:
      - aip-network
    depends_on:
      opensearch:
        condition: service_healthy
    command: python -m backend.scripts.init_metrics_infrastructure
    restart: "no"

  # Backend API - Commented out until Phase 2 implementation
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aip-backend
    environment:
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_SCHEME=http
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - LLM_PROVIDER=ollama
      - LLM_MODEL=llama3.1:8b
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - backend-cache:/root/.cache
    ports:
      - "8000:8000"
    networks:
      - aip-network
    depends_on:
      opensearch:
        condition: service_healthy
      init-metrics:
        condition: service_completed_successfully
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend - React SPA with Vite
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: aip-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    networks:
      - aip-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # MCP Servers - Thin wrapper architecture delegating to backend API
  mcp-discovery:
    build:
      context: ./mcp-servers
      dockerfile: Dockerfile
    container_name: aip-mcp-discovery
    environment:
      - BACKEND_URL=http://backend:8000
      - MCP_SERVER_NAME=discovery
    env_file:
      - .env
    volumes:
      - ./mcp-servers:/app
    ports:
      - "8001:8000"
    networks:
      - aip-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000/mcp | grep -q 'jsonrpc' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  mcp-metrics:
    build:
      context: ./mcp-servers
      dockerfile: Dockerfile
    container_name: aip-mcp-metrics
    environment:
      - BACKEND_URL=http://backend:8000
      - MCP_SERVER_NAME=metrics
    env_file:
      - .env
    volumes:
      - ./mcp-servers:/app
    ports:
      - "8002:8000"
    networks:
      - aip-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000/mcp | grep -q 'jsonrpc' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  mcp-security:
    build:
      context: ./mcp-servers
      dockerfile: Dockerfile
    container_name: aip-mcp-security
    environment:
      - BACKEND_URL=http://backend:8000
      - MCP_SERVER_NAME=security
    env_file:
      - .env
    volumes:
      - ./mcp-servers:/app
    ports:
      - "8003:8000"
    networks:
      - aip-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000/mcp | grep -q 'jsonrpc' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  mcp-optimization:
    build:
      context: ./mcp-servers
      dockerfile: Dockerfile
    container_name: aip-mcp-optimization
    environment:
      - BACKEND_URL=http://backend:8000
      - MCP_SERVER_NAME=optimization
    env_file:
      - .env
    volumes:
      - ./mcp-servers:/app
