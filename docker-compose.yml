      - .env
    volumes:
      - ./mcp-servers:/app
    ports:
      - "8005:8000"
    networks:
      - aip-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000/mcp | grep -q 'jsonrpc' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  mcp-prediction:
    build:
      context: ./mcp-servers
      dockerfile: Dockerfile
    container_name: aip-mcp-prediction
    environment:
      - BACKEND_URL=http://backend:8000
      - MCP_SERVER_NAME=prediction
    env_file:
      - .env
    volumes:
      - ./mcp-servers:/app
    ports:
      - "8006:8000"
    networks:
