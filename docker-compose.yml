# API Intelligence Plane - Local Development Environment
version: '3.8'

services:
  # OpenSearch - Data Store
  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: aip-opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"
    networks:
      - aip-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # OpenSearch Dashboards - UI for OpenSearch
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.18.0
    container_name: aip-opensearch-dashboards
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    networks:
      - aip-network
    depends_on:
      opensearch:
        condition: service_healthy

  # Backend API
  # Note: Automatically initializes all OpenSearch infrastructure on startup
  # (indices, templates, ILM policies) - no separate init service needed
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aip-backend
    environment:
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_SCHEME=http
      - LOG_LEVEL=DEBUG
      - PYTHONUNBUFFERED=1
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - LLM_PROVIDER=ollama
      - LLM_MODEL=llama3.1:8b
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - backend-cache:/root/.cache
    ports:
      - "8000:8000"
    networks:
      - aip-network
    # depends_on:
    #   opensearch:
    #     condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend - React SPA with Vite
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: aip-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    networks:
      - aip-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # MCP Unified Server - Single interface for all API Intelligence Plane functionality
  mcp-unified:
    build:
      context: ./mcp-servers
      dockerfile: Dockerfile
    container_name: aip-mcp-unified
    environment:
      - BACKEND_URL=http://backend:8000
      - MCP_SERVER_NAME=unified
    env_file:
      - .env
    volumes:
      - ./mcp-servers:/app
    ports:
      - "8007:8000"
    networks:
      - aip-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000/mcp | grep -q 'jsonrpc' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

networks:
  aip-network:
    driver: bridge

volumes:
  opensearch-data:
    driver: local
  backend-cache:
    driver: local

