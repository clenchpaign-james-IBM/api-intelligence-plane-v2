    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000/mcp | grep -q 'jsonrpc' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Demo Gateway - Commented out until Phase 2 implementation
  # demo-gateway:
  #   build:
  #     context: ./demo-gateway
