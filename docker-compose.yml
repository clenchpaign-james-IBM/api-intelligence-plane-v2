      test: ["CMD-SHELL", "curl -s http://localhost:8000/mcp | grep -q 'jsonrpc' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  mcp-compliance:
    build:
      context: ./mcp-servers
      dockerfile: Dockerfile
