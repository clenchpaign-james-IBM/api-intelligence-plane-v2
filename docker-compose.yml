  #   depends_on:
  #     opensearch:
  #       condition: service_healthy
  #   healthcheck:
  #     test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5
  #     start_period: 60s

networks:
  aip-network:
    driver: bridge

volumes:
  opensearch-data:
    driver: local
  backend-cache:
    driver: local
  maven-cache:
    driver: local

