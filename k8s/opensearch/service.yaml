apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: api-intelligence-plane
  labels:
    app: opensearch
    component: database
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - port: 9200
    name: http
    targetPort: 9200
  - port: 9300
    name: transport
    targetPort: 9300
  - port: 9600
    name: metrics
    targetPort: 9600
  selector:
    app: opensearch
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch-client
  namespace: api-intelligence-plane
  labels:
    app: opensearch
    component: database
spec:
  type: ClusterIP
  ports:
  - port: 9200
    name: http
    targetPort: 9200
  selector:
    app: opensearch

